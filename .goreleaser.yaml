version: 2
project_name: addigy-cli
changelog:
  disable: true
builds:
  - id: addigy-cli
    main: ./cmd/addigy-cli
    binary: addigy-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/joelcodess/addigy-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: addigy-mcp
    main: ./cmd/addigy-mcp
    binary: addigy-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
